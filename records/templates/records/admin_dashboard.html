{% extends "records/base.html" %}
{% block content %}

<style>
    .btn-print {
        background-color: #3498db;
        color: white;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 4px;
        border: none;
    }

    .btn-delete {
        background-color: #e74c3c;
        color: white;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 4px;
        border: none;
    }

    .btn-edit {
        background-color: #2ecc71;
        color: white;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 4px;
        border: none;
    }

    .actions a {
        margin-right: 6px;
    }
</style>

<h3>Admin Dashboard</h3>

<form method="get">
    <input type="text" name="q" placeholder="Search patient name">
    <br><br>
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Full Name</th>
        <th>Date Saved</th>
        <th>Actions</th>
    </tr>

    {% for patient in patients %}
    <tr>
        <td>{{ patient.full_name }}</td>
        <td>{{ patient.created_at }}</td>
        <td class="actions">
            <a href="/edit/{{ patient.id }}/" class="btn-edit">Edit</a>
            <a href="/print/{{ patient.id }}/" class="btn-print">Print</a>
            <a href="/delete/{{ patient.id }}/" class="btn-delete"
               onclick="return confirm('Are you sure you want to delete this record?');">
               Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
