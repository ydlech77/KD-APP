{% extends "records/base.html" %}
{% block content %}

<style>
    .form-container {
        max-width: 500px;
        margin: 30px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    h3 {
        color: #1a5f7a; /* Deep blue */
        text-align: center;
        margin-bottom: 25px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        font-weight: 600;
        color: #444;
        margin-bottom: 5px;
        font-size: 0.9rem;
    }
    input[type="text"], 
    input[type="date"], 
    textarea, 
    select {
        width: 100%;
        padding: 10px;
        border: 1.5px solid #d1e1e9;
        border-radius: 6px;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
        outline: none;
        border-color: #3498db; /* Bright blue focus */
    }
    button {
        width: 100%;
        background-color: #3498db;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.3s;
    }
    button:hover {
        background-color: #2980b9;
    }
</style>

<div class="form-container">
    <h3>Add Patient Record</h3>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- NEW RECOMMENDED FIELDS -->
        <div class="form-group">
            <label>Blood Group</label>
            <select name="blood_group">
                <option value="">Unknown</option>
                <option value="A+">A+</option>
                <option value="O+">O+</option>
                <option value="B+">B+</option>
                <option value="AB+">AB+</option>
                <option value="A-">A-</option>
                <option value="O-">O-</option>
                <option value="B-">B-</option>
                <option value="AB-">AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label>Allergies (if any)</label>
            <input type="text" name="allergies" placeholder="N/A">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone_number" placeholder="+123...">
        </div>

        <div class="form-group">
            <label>Emergency Contact (Name & Phone)</label>
            <input type="text" name="emergency_contact">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3"></textarea>
        </div>

        <button type="submit">Save Record</button>
    </form>
</div>

{% endblock %}
